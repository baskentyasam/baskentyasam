# VPS production stack (Caddy + DB + API + Web)
#
# 1) .env dosyasini production degerleriyle doldurun:
#    ASPNETCORE_ENVIRONMENT=Production
#    FRONTEND_URL=https://ALAN-ADINIZ
#    API_BASE_URL=https://ALAN-ADINIZ
#    DOMAIN=ALAN-ADINIZ
#    JWT_SECRET_KEY=...
#    POSTGRES_PASSWORD=...
#    SUPERADMIN_EMAIL=...
#    SUPERADMIN_PASSWORD=...
#
# 2) MetuNic DNS: A kaydi -> VPS IP
#
# 3) Calistir:
#    docker compose -f docker-compose.vps.yml up --build -d

services:
  db:
    image: postgres:16-alpine
    container_name: baskent_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-oys3}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-oys3}" ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: ./backend
    container_name: baskent_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-oys3};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      Jwt__SecretKey: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      Jwt__ExpiryMinutes: ${JWT_EXPIRES_MINUTES:-120}
      EmailSettings__Password: ${SMTP_PASSWORD:-}
      EmailSettings__From: ${SMTP_FROM_EMAIL:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__Username: ${SMTP_USERNAME:-}
      Smtp__FromEmail: ${SMTP_FROM_EMAIL:-}
      Smtp__Host: ${SMTP_HOST:-smtp.gmail.com}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__FromName: ${SMTP_FROM_NAME:-Başkent Yaşam Platformu}
      DisableHttpsRedirection: ${DISABLE_HTTPS_REDIRECTION:-true}
      APP_BASE_URL: ${API_BASE_URL:?API_BASE_URL is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
      SUPERADMIN_NAME: ${SUPERADMIN_NAME:-Sistem Yöneticisi}
    volumes:
      - api_logs:/app/logs
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: /api
    container_name: baskent_web
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: baskent_caddy
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required for HTTPS}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  api_logs:
  caddy_data:
  caddy_config:
