# Local: cp .env.example .env  (zorunlu secret'lar .env dosyasında tanımlanmalı)
services:
  db:
    image: postgres:16-alpine
    container_name: baskent_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env}
      POSTGRES_DB: ${POSTGRES_DB:-oys3}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-oys3}" ]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    container_name: baskent_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:?Set ASPNETCORE_ENVIRONMENT in .env (Development or Production)}
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-oys3};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      Jwt__SecretKey: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required. Copy .env.example to .env}
      Jwt__ExpiryMinutes: ${JWT_EXPIRES_MINUTES:-1440}
      EmailSettings__Password: ${SMTP_PASSWORD:-}
      EmailSettings__From: ${SMTP_FROM_EMAIL:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__Username: ${SMTP_USERNAME:-}
      Smtp__FromEmail: ${SMTP_FROM_EMAIL:-}
      Smtp__Host: ${SMTP_HOST:-smtp.gmail.com}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__FromName: ${SMTP_FROM_NAME:-Başkent Yaşam Platformu}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Başkent Yaşam Platformu}
      DisableHttpsRedirection: ${DISABLE_HTTPS_REDIRECTION:-true}
      APP_BASE_URL: ${API_BASE_URL:-http://localhost:5283}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "5283:8080"
    volumes:
      - api_logs:/app/logs

  web:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: /api
    container_name: baskent_web
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  pgdata:
  api_logs:
